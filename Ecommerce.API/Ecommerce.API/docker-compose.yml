services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-container
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Pass123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - ecommerce-network

  redis:
    image: redis:latest
    container_name: redis-container
    ports:
      - "6379:6379"
    networks:
      - ecommerce-network

  ecommerce-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-container
    depends_on:
      - sqlserver
      - redis
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver-container;Database=EcommerceDb;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=true;
      - Redis__ConnectionString=redis-container:6379
    networks:
      - ecommerce-network

volumes:
  sqlserver-data:

networks:
  ecommerce-network:
    driver: bridge